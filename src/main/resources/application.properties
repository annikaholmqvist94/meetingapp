spring.application.name=meetingapp

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/meetingdb
spring.datasource.username=meeting_user
spring.datasource.password=meeting_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 webbkonsol
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true
spring.web.resources.charset=UTF-8

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
